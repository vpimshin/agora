<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440, initial-scale=1" />
<title>AGORA — Hackathon Stage Demo</title>
<link rel="preconnect" href="https://rsms.me/" />
<link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Inter','ui-sans-serif','system-ui'] },
      colors: {
        ink:   { 950:'#05060a', 900:'#0a0d18', 800:'#10141f', 700:'#1a2030', 600:'#262e44' },
        flow:  { 400:'#fbbf24', 500:'#f59e0b' },
        emp:   { 400:'#22d3ee', 500:'#06b6d4' },
        focus: { 400:'#a78bfa', 500:'#8b5cf6' },
        good:  { 400:'#34d399', 500:'#10b981' },
      }
    }
  }
};
</script>
<style>
  html,body{height:100%;}
  body{
    font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    background: radial-gradient(1200px 700px at 75% -10%, rgba(139,92,246,.18), transparent 60%),
                radial-gradient(900px 600px at 10% 110%, rgba(34,211,238,.12), transparent 60%),
                #05060a;
    color: #e6e9f2;
    overflow: hidden;
    letter-spacing: -0.01em;
  }
  body.empathy{
    background: radial-gradient(1200px 700px at 75% -10%, rgba(34,211,238,.28), transparent 60%),
                radial-gradient(900px 600px at 10% 110%, rgba(167,139,250,.12), transparent 60%),
                #04090d;
  }
  body.flow{
    background: radial-gradient(1200px 700px at 75% -10%, rgba(245,158,11,.22), transparent 60%),
                radial-gradient(900px 600px at 10% 110%, rgba(167,139,250,.12), transparent 60%),
                #08080a;
  }
  .glass{
    background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
    border: 1px solid rgba(255,255,255,.07);
    backdrop-filter: blur(8px);
  }
  .glass-strong{
    background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
    border: 1px solid rgba(255,255,255,.10);
    backdrop-filter: blur(12px);
  }
  .grid-bg{
    background-image:
      linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
    background-size: 56px 56px;
  }
  .scene-enter{ animation: sceneIn .55s ease both; }
  @keyframes sceneIn{ from{opacity:0; transform: translateY(10px); filter: blur(4px);} to{opacity:1; transform:none; filter:none;} }
  .pulse-dot::before{
    content:''; position:absolute; inset:-4px; border-radius:9999px;
    border:1px solid currentColor; animation: ping 1.6s ease-out infinite;
  }
  @keyframes ping{ 0%{opacity:.7; transform:scale(.8);} 100%{opacity:0; transform:scale(1.8);} }
  .ring-glow{ box-shadow: 0 0 0 1px rgba(255,255,255,.06), 0 24px 60px -20px rgba(139,92,246,.45); }
  .badge-glow{ box-shadow: 0 0 0 1px rgba(255,255,255,.08), 0 18px 60px -10px rgba(245,158,11,.55); }
  .kg-edge{ stroke-dasharray: 6 6; animation: dash 12s linear infinite; }
  @keyframes dash{ to{ stroke-dashoffset: -240; } }
  .marquee{ animation: marq 40s linear infinite; }
  @keyframes marq{ from{transform:translateX(0);} to{transform:translateX(-50%);} }
  .stage-btn{
    background: rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.10);
    transition: all .15s ease;
  }
  .stage-btn:hover{ background: rgba(255,255,255,.12); transform: translateY(-1px); }
  .stage-btn.primary{
    background: linear-gradient(135deg, #8b5cf6, #6d28d9);
    border-color: rgba(255,255,255,.14);
    box-shadow: 0 14px 40px -10px rgba(139,92,246,.7);
  }
  .stage-btn.primary:hover{ filter: brightness(1.08); }
  .chip{
    padding: 4px 10px; border-radius: 9999px; font-size: 11px; font-weight:600; letter-spacing:.04em;
    text-transform: uppercase; border:1px solid rgba(255,255,255,.10);
  }
  .agent-active{ animation: agentGlow 1.6s ease-in-out infinite; }
  @keyframes agentGlow{
    0%,100%{ box-shadow: 0 0 0 0 rgba(167,139,250,.0);}
    50%{ box-shadow: 0 0 0 6px rgba(167,139,250,.25);}
  }
  .progress{ height:6px; background: rgba(255,255,255,.08); border-radius:9999px; overflow:hidden; }
  .progress > div{ height:100%; background: linear-gradient(90deg, #a78bfa, #22d3ee); transition: width .8s cubic-bezier(.2,.7,.2,1); }
  .token-pop{ animation: pop .8s cubic-bezier(.2,.7,.2,1); }
  @keyframes pop{ 0%{transform:scale(.6); opacity:0;} 60%{transform:scale(1.15); opacity:1;} 100%{transform:scale(1); opacity:1;} }
  .breath{ animation: breath 4s ease-in-out infinite; }
  @keyframes breath{ 0%,100%{ transform: scale(1);} 50%{ transform: scale(1.06);} }
  .nice-scroll::-webkit-scrollbar{ width:6px; height:6px;}
  .nice-scroll::-webkit-scrollbar-thumb{ background: rgba(255,255,255,.15); border-radius:9999px;}
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{ animation: none !important; transition: none !important; }
  }
</style>
</head>
<body class="min-h-screen w-screen">

<header class="fixed top-0 inset-x-0 z-40 px-8 py-4 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-focus-500 to-emp-500 grid place-items-center text-white font-black">A</div>
    <div>
      <div class="text-sm font-semibold tracking-wide">AGORA</div>
      <div class="text-[11px] text-white/50 -mt-0.5">Agentic Goal-Oriented Reflective Adaptive academy</div>
    </div>
  </div>
  <div id="agentBar" class="flex items-center gap-2"></div>
  <div class="flex items-center gap-3">
    <div class="glass rounded-full px-3 py-1.5 text-xs flex items-center gap-2">
      <span class="w-2 h-2 rounded-full bg-good-400"></span>
      <span class="text-white/70">Live · v2.0 · hackathon build</span>
    </div>
    <div id="tokenChip" class="glass rounded-full px-3 py-1.5 text-xs flex items-center gap-2">
      <span>⭐</span><span class="font-semibold tabular-nums" id="tokenCount">0</span>
      <span class="text-white/50">tokens</span>
    </div>
  </div>
</header>

<main id="stage" class="absolute inset-0 pt-20 pb-20 px-10"></main>

<footer class="fixed bottom-0 inset-x-0 z-40 px-8 py-4 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <div class="glass rounded-full pl-1 pr-3 py-1 flex items-center gap-2 text-xs">
      <span id="sceneIdx" class="w-7 h-7 rounded-full bg-white/10 grid place-items-center font-semibold">1</span>
      <span id="sceneName" class="text-white/80 font-medium">Cold open</span>
      <span class="text-white/30">/</span>
      <span class="text-white/40">7</span>
    </div>
    <div class="hidden md:flex items-center gap-2 text-[11px] text-white/40">
      <span>← / →</span><span>navigate</span>
      <span class="ml-2">Space</span><span>next</span>
      <span class="ml-2">F</span><span>fullscreen</span>
    </div>
  </div>
  <div class="flex items-center gap-2">
    <button id="btnPrev" class="stage-btn rounded-full px-4 py-2 text-sm">← Back</button>
    <button id="btnNext" class="stage-btn primary rounded-full px-5 py-2 text-sm font-semibold">Next →</button>
    <button id="btnRestart" class="stage-btn rounded-full px-3 py-2 text-sm" title="Restart">↻</button>
    <button id="btnFs" class="stage-btn rounded-full px-3 py-2 text-sm" title="Fullscreen">⛶</button>
  </div>
</footer>

<script>
const AGENTS = [
  { id:'pedagogy',  name:'Pedagogy',  glyph:'🧭', color:'focus',  desc:'Designs the learning path' },
  { id:'verifier',  name:'Verifier',  glyph:'✅', color:'good',   desc:'Makes outcomes objective' },
  { id:'curator',   name:'Curator',   glyph:'📚', color:'emp',    desc:'Selects best resources' },
  { id:'empathy',   name:'Empathy',   glyph:'💛', color:'flow',   desc:'Notices struggle, adapts tone' },
  { id:'companion', name:'Companion', glyph:'🤝', color:'focus',  desc:'Daily nudges, accountability' },
];

let state = { scene:0, tokens:0, active:new Set(), palette:'default' };
const stageEl = document.getElementById('stage');

function setPalette(p){
  state.palette = p;
  document.body.classList.remove('empathy','flow');
  if(p==='empathy') document.body.classList.add('empathy');
  if(p==='flow') document.body.classList.add('flow');
}
function setActive(ids){ state.active = new Set(ids); renderAgentBar(); }
function renderAgentBar(){
  const bar = document.getElementById('agentBar');
  bar.innerHTML = AGENTS.map(a => {
    const active = state.active.has(a.id);
    return `<div class="glass rounded-full px-2.5 py-1 text-[11px] flex items-center gap-1.5 ${active?'agent-active':''}" title="${a.desc}">
      <span class="text-base leading-none">${a.glyph}</span>
      <span class="${active?'text-white':'text-white/45'} font-medium">${a.name}</span>
      ${active?'<span class="w-1.5 h-1.5 rounded-full bg-focus-400"></span>':''}
    </div>`;
  }).join('');
}
function awardTokens(n){
  const start = state.tokens; state.tokens += n;
  const el = document.getElementById('tokenCount');
  const t0 = performance.now(); const dur = 700;
  function step(t){
    const k = Math.min(1,(t-t0)/dur);
    el.textContent = Math.round(start + (state.tokens-start)*k);
    if(k<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
  const chip = document.getElementById('tokenChip');
  chip.classList.remove('token-pop'); void chip.offsetWidth; chip.classList.add('token-pop');
}

const SCENES = [
  { name:'Cold open',           render: renderS0 },
  { name:'Goal · Maya speaks',  render: renderS1 },
  { name:'Multi-agent council', render: renderS2 },
  { name:'Knowledge graph',     render: renderS3 },
  { name:'Today · the plan',    render: renderS4 },
  { name:'Empathy loop',        render: renderS5 },
  { name:'Verifiable credential', render: renderS6 },
];

function renderScene(){
  const s = SCENES[state.scene];
  document.getElementById('sceneIdx').textContent = state.scene+1;
  document.getElementById('sceneName').textContent = s.name;
  stageEl.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'h-full scene-enter';
  stageEl.appendChild(wrap);
  s.render(wrap);
  const prevBtn = document.getElementById('btnPrev');
  prevBtn.disabled = state.scene===0;
  prevBtn.classList.toggle('opacity-40', state.scene===0);
  document.getElementById('btnNext').textContent = state.scene===SCENES.length-1 ? 'Restart ↻' : 'Next →';
}

/* S0 */
function renderS0(root){
  setActive([]); setPalette('default');
  root.innerHTML = `
    <div class="h-full grid-bg rounded-3xl glass-strong relative overflow-hidden">
      <div class="absolute -top-24 -left-24 w-[28rem] h-[28rem] rounded-full bg-focus-500/20 blur-3xl"></div>
      <div class="absolute -bottom-32 -right-24 w-[34rem] h-[34rem] rounded-full bg-emp-500/20 blur-3xl"></div>
      <div class="relative h-full grid grid-cols-12 gap-8 p-12">
        <div class="col-span-7 flex flex-col justify-center">
          <div class="chip text-white/70 mb-6 inline-flex w-fit">Hackathon · 2026 · live demo</div>
          <h1 class="text-7xl font-black leading-[1.02] tracking-tight">
            Learning, with<br/>
            <span class="bg-gradient-to-r from-focus-400 via-emp-400 to-flow-400 bg-clip-text text-transparent">five agents</span>
            on your side.
          </h1>
          <p class="mt-6 text-xl text-white/65 max-w-2xl leading-relaxed">
            AGORA turns a fuzzy goal into a verifiable journey.
            Pedagogy plans, Verifier removes ambiguity, Curator finds the signal,
            Empathy notices the struggle, Companion shows up daily.
          </p>
          <div class="mt-10 flex items-center gap-3 text-sm">
            <div class="glass rounded-full px-3 py-1.5">No black-box answers</div>
            <div class="glass rounded-full px-3 py-1.5">Open Badges 3.0</div>
            <div class="glass rounded-full px-3 py-1.5">Private-by-default</div>
          </div>
          <div class="mt-12 text-white/40 text-sm">Press <kbd class="px-1.5 py-0.5 rounded bg-white/10 text-white/80">Space</kbd> to begin Maya's story →</div>
        </div>
        <div class="col-span-5 relative">
          <div class="absolute inset-0 grid place-items-center">
            <div class="relative w-[28rem] h-[28rem]">
              <div class="absolute inset-0 rounded-full border border-white/10"></div>
              <div class="absolute inset-8 rounded-full border border-white/10"></div>
              <div class="absolute inset-16 rounded-full border border-white/10"></div>
              ${AGENTS.map((a,i)=>{
                const angle = (i/AGENTS.length)*Math.PI*2 - Math.PI/2;
                const r=170; const x=Math.cos(angle)*r+224-36; const y=Math.sin(angle)*r+224-36;
                return `<div class="absolute rounded-2xl glass-strong grid place-items-center text-3xl breath" style="left:${x}px; top:${y}px; width:72px; height:72px; animation-delay:${i*0.4}s">${a.glyph}</div>`;
              }).join('')}
              <div class="absolute inset-0 grid place-items-center">
                <div class="w-28 h-28 rounded-3xl bg-gradient-to-br from-focus-500 to-emp-500 grid place-items-center text-5xl ring-glow">🎓</div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="absolute bottom-0 inset-x-0 overflow-hidden border-t border-white/5 bg-black/30">
        <div class="marquee whitespace-nowrap py-2.5 text-xs text-white/45 flex gap-10">
          ${Array(2).fill(0).map(()=>`
            <span>● Spec-Driven Design</span><span>● Empathy Loop</span>
            <span>● Verifiable Credentials</span><span>● Living Knowledge Graph</span>
            <span>● Agent Guardrails</span><span>● Token Economy</span>
            <span>● Built for hackathons, designed for scale</span>
          `).join('')}
        </div>
      </div>
    </div>`;
}

/* S1 */
function renderS1(root){
  setActive(['pedagogy','companion']); setPalette('default');
  root.innerHTML = `
    <div class="h-full grid grid-cols-12 gap-6">
      <aside class="col-span-3 glass-strong rounded-3xl p-6 flex flex-col">
        <div class="flex items-center gap-3">
          <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-flow-400 to-flow-500 grid place-items-center text-2xl">👩🏽‍💻</div>
          <div>
            <div class="text-lg font-semibold">Maya Chen</div>
            <div class="text-xs text-white/50">Junior SWE · 2 yrs · Berlin</div>
          </div>
        </div>
        <div class="mt-6 space-y-3 text-sm">
          <div class="text-white/50 text-xs uppercase tracking-wider">Context</div>
          <div class="glass rounded-xl p-3 text-white/80">Promoted to mid-level review track. Blocker: <b class="text-white">system design</b>.</div>
          <div class="glass rounded-xl p-3 text-white/80">Tried 3 courses. Watched. Forgot. Bored.</div>
          <div class="glass rounded-xl p-3 text-white/80">Has 45 min/day. Hates fluff.</div>
        </div>
        <div class="mt-auto pt-6">
          <div class="text-white/50 text-xs uppercase tracking-wider mb-2">Today's intent</div>
          <div class="text-2xl font-semibold leading-tight">"Help me actually <span class="text-flow-400">get</span> system design — not just watch it."</div>
        </div>
      </aside>
      <section class="col-span-6 glass-strong rounded-3xl p-8 relative">
        <div class="chip text-white/70 mb-4 inline-flex">Scene 1 · Goal capture</div>
        <h2 class="text-4xl font-bold tracking-tight">What do you want to be able to do?</h2>
        <p class="text-white/55 mt-2">Write it the way you'd say it to a friend. We'll handle the structure.</p>
        <div class="mt-8 glass rounded-2xl p-5 ring-1 ring-focus-500/30">
          <div class="text-[11px] uppercase tracking-wider text-focus-400 mb-2">Maya types</div>
          <div id="mayaInput" class="text-2xl font-medium leading-snug min-h-[6rem]"></div>
          <div class="mt-3 flex items-center gap-3 text-xs text-white/50">
            <span class="w-2 h-2 rounded-full bg-good-400"></span>
            <span>auto-saving · private · never used to train</span>
          </div>
        </div>
        <div id="pedagogyEcho" class="mt-5 hidden">
          <div class="flex items-start gap-3">
            <div class="w-9 h-9 rounded-xl bg-focus-500/20 grid place-items-center text-lg">🧭</div>
            <div class="flex-1 glass rounded-2xl p-4">
              <div class="text-[11px] uppercase tracking-wider text-focus-400 mb-1">Pedagogy paraphrases</div>
              <div class="text-lg leading-relaxed">So — by Friday three weeks from now, you want to <b>walk a senior through your own design of a URL shortener</b> at the whiteboard, defending trade-offs.<br/><span class="text-white/55 text-base">Did I get that right?</span></div>
            </div>
          </div>
        </div>
      </section>
      <aside class="col-span-3 glass-strong rounded-3xl p-6 flex flex-col">
        <div class="text-white/60 text-xs uppercase tracking-wider mb-3">Live agent thoughts</div>
        <div id="thoughts" class="space-y-3 text-sm flex-1 overflow-auto nice-scroll"></div>
        <div class="mt-4 pt-4 border-t border-white/5 text-[11px] text-white/40">
          Every reasoning step is auditable. Press <kbd class="px-1 rounded bg-white/10">⌃R</kbd> for the full trace.
        </div>
      </aside>
    </div>`;
  const t = "I want to feel confident in system design interviews. Not memorize — actually understand the trade-offs.";
  const target = document.getElementById('mayaInput');
  let i=0;
  const iv = setInterval(()=>{
    target.textContent = t.slice(0, ++i) + (i<t.length?'▍':'');
    if(i>=t.length){
      clearInterval(iv); target.textContent = t;
      setTimeout(()=> document.getElementById('pedagogyEcho').classList.remove('hidden'), 350);
      pushThoughts();
    }
  }, 28);
  function pushThoughts(){
    const lines = [
      { who:'Companion', glyph:'🤝', color:'focus', txt:'Calendar reads: 45 min daily, mornings. Energy peak 09:30.' },
      { who:'Pedagogy',  glyph:'🧭', color:'focus', txt:'Goal is fuzzy. Need a verifiable artefact + a deadline.' },
      { who:'Verifier',  glyph:'✅', color:'good',  txt:'"Confident" is subjective. Proposing: design walkthrough, peer-graded rubric.' },
      { who:'Pedagogy',  glyph:'🧭', color:'focus', txt:'3-week ladder: caching → sharding → consistency. Start with URL shortener (high signal, low scope).' },
      { who:'Curator',   glyph:'📚', color:'emp',   txt:'2 papers, 1 video, 1 live system. Dropping 14 results that just rephrase the same idea.' },
    ];
    const list = document.getElementById('thoughts');
    lines.forEach((l,k)=>{
      setTimeout(()=>{
        const node = document.createElement('div');
        node.className = 'glass rounded-xl p-3 scene-enter';
        node.innerHTML = `<div class="flex items-center gap-2 text-[11px] text-${l.color}-400 mb-1"><span>${l.glyph}</span><span class="font-semibold uppercase tracking-wider">${l.who}</span></div><div class="text-white/80 leading-snug">${l.txt}</div>`;
        list.appendChild(node);
        list.scrollTop = list.scrollHeight;
      }, 1200 + k*900);
    });
  }
}

/* S2 */
function renderS2(root){
  setActive(['pedagogy','verifier','curator']); setPalette('default');
  root.innerHTML = `
    <div class="h-full grid grid-cols-12 gap-6">
      <section class="col-span-8 glass-strong rounded-3xl p-8 relative overflow-hidden">
        <div class="chip text-white/70 mb-4 inline-flex">Scene 2 · The Council</div>
        <h2 class="text-4xl font-bold tracking-tight">Three agents. One contract.</h2>
        <p class="text-white/55 mt-2 max-w-2xl">Watch them negotiate the rubric in front of you. No magic. No hidden prompts.</p>
        <div class="mt-8 grid grid-cols-3 gap-4">
          ${[
            {n:'Pedagogy', g:'🧭', c:'focus', q:"How do we know she's ready?"},
            {n:'Verifier',  g:'✅', c:'good',  q:'Make it observable, falsifiable, fair.'},
            {n:'Curator',   g:'📚', c:'emp',   q:'Tie each criterion to a real-world artefact.'},
          ].map(a=>`
            <div class="glass rounded-2xl p-4 border border-${a.c}-500/30">
              <div class="flex items-center gap-2"><span class="text-2xl">${a.g}</span><span class="font-semibold">${a.n}</span></div>
              <div class="mt-2 text-sm text-white/65 italic">"${a.q}"</div>
            </div>`).join('')}
        </div>
        <div class="mt-8">
          <div class="flex items-center justify-between text-xs text-white/55 uppercase tracking-wider mb-2">
            <span>Success criteria · v1 → v2</span>
            <span>auto-converging · <span id="criteriaPct">0%</span> objective</span>
          </div>
          <div class="progress mb-5"><div id="critProg" style="width:0%"></div></div>
          <div id="critList" class="space-y-3"></div>
        </div>
        <div class="absolute bottom-6 right-8 text-xs text-white/40">All edits reversible · revision history kept · ADR-003</div>
      </section>
      <aside class="col-span-4 glass-strong rounded-3xl p-6 flex flex-col">
        <div class="text-white/60 text-xs uppercase tracking-wider mb-3">Why this matters</div>
        <div class="space-y-3 text-sm">
          <div class="glass rounded-xl p-3"><b class="text-white">No subjective targets.</b> "Feel confident" gets transformed into a measurable artefact.</div>
          <div class="glass rounded-xl p-3"><b class="text-white">Negotiation, not dictation.</b> Maya can challenge any criterion — it's <i>her</i> contract.</div>
          <div class="glass rounded-xl p-3"><b class="text-white">Anti-Goodhart.</b> Verifier flags metrics that would game the goal.</div>
        </div>
        <div class="mt-auto pt-6">
          <div class="text-white/40 text-[11px] uppercase tracking-wider mb-2">Diff highlight</div>
          <div class="font-mono text-xs glass rounded-xl p-3 leading-relaxed">
            <div class="text-red-400/80">- "feel confident in system design"</div>
            <div class="text-good-400">+ design URL shortener at whiteboard</div>
            <div class="text-good-400">+ defend 3 trade-offs to senior peer</div>
            <div class="text-good-400">+ deadline 2026-05-27 · rubric attached</div>
          </div>
        </div>
      </aside>
    </div>`;
  const stages = [
    { v:'feel confident in system design', cls:'border-red-400/40 text-white/60', tag:'⚠ subjective' },
    { v:'pass a mock interview',           cls:'border-flow-400/40',                tag:'~ partial' },
    { v:'design URL shortener at whiteboard, defend trade-offs to peer', cls:'border-good-400/40', tag:'✓ objective' },
  ];
  const list = document.getElementById('critList');
  const prog = document.getElementById('critProg');
  const pct = document.getElementById('criteriaPct');
  stages.forEach((s,k)=>{
    setTimeout(()=>{
      const row = document.createElement('div');
      row.className = `glass rounded-xl p-4 flex items-center justify-between scene-enter border ${s.cls}`;

document.getElementById('btnRestart').onclick = ()=>{
  state = { scene:0, tokens:0, active:new Set(), palette:'default' };
  document.getElementById('tokenCount').textContent='0'; setPalette('default'); renderScene();
};
document.getElementById('btnFs').onclick = ()=>{
  if(!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
};
window.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight' || e.key===' '){ e.preventDefault(); next(); }
  if(e.key==='ArrowLeft') prev();
  if(e.key.toLowerCase()==='f') document.getElementById('btnFs').click();
  if(e.key.toLowerCase()==='r') document.getElementById('btnRestart').click();
});
